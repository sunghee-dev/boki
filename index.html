}
@media (prefers-color-scheme:dark){
  :root{
    --bg:#12151a; --surface:#1b1f26; --surface-2:#232830;
    --ink:#e8ebef; --muted:#a0a9b4; --faint:#727c88;

    --indigo:#9fb4d8; --indigo-soft:#8296ba;
    --new:#9aa7b6; --new-bg:#242a33;

*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink)}
body{font-family:system-ui,-apple-system,"Hiragino Kaku Gothic ProN","Hiragino Sans","Noto Sans JP","Apple SD Gothic Neo","Noto Sans KR",sans-serif;
  -webkit-text-size-adjust:100%;line-height:1.5}
ruby rt{font-size:.52em;color:var(--faint);font-weight:400;letter-spacing:0}
.wrap{max-width:640px;margin:0 auto;padding:0 16px calc(120px + env(safe-area-inset-bottom))}
header{position:sticky;top:0;z-index:20;background:var(--bg);
  padding:calc(12px + env(safe-area-inset-top)) 16px 10px;border-bottom:1px solid var(--line)}
.hbar{max-width:640px;margin:0 auto;display:flex;align-items:center;justify-content:space-between}
.brand{display:flex;align-items:baseline;gap:9px}
.mark{font-size:20px;font-weight:600;color:var(--indigo);letter-spacing:.5px}
.mark small{font-size:12px;color:var(--muted);font-weight:400;margin-left:2px}
.kanji{font-size:13px;color:var(--gold);letter-spacing:2px}
.hbtns{display:flex;gap:6px}
.ibtn{border:1px solid var(--line-strong);background:var(--surface);color:var(--ink);
  width:38px;height:38px;border-radius:10px;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.ibtn:active{transform:scale(.95)}
.stats{max-width:640px;margin:10px auto 0;display:flex;gap:8px}
.stat{flex:1;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:8px 10px;text-align:center}
.stat b{display:block;font-size:19px;font-weight:600}
.stat span{font-size:11px;color:var(--muted)}
.stat.n b{color:var(--new)} .stat.r b{color:var(--review)} .stat.k b{color:var(--known)}
.filters{padding-top:12px}
.frow{display:flex;gap:7px;overflow-x:auto;padding:3px 0;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.frow::-webkit-scrollbar{display:none}
.flabel{font-size:11px;color:var(--faint);text-transform:uppercase;letter-spacing:.8px;margin:10px 2px 2px}
.chip{flex:0 0 auto;border:1px solid var(--line-strong);background:var(--surface);color:var(--muted);
  padding:7px 13px;border-radius:20px;font-size:13px;cursor:pointer;white-space:nowrap}
.chip.on{background:var(--indigo);border-color:var(--indigo);color:#fff}
@media (prefers-color-scheme:dark){.chip.on{color:#12151a}}
.chip .c{opacity:.7;margin-left:5px;font-size:12px}
.studybar{margin:16px 0 6px}
.studybtn{width:100%;border:none;background:var(--indigo);color:#fff;padding:15px;border-radius:var(--radius);
  font-size:15px;font-weight:500;cursor:pointer;letter-spacing:.3px}
@media (prefers-color-scheme:dark){.studybtn{color:#12151a}}
.studybtn:active{transform:scale(.99)}
.studybtn:disabled{opacity:.4}
.count-line{font-size:12px;color:var(--muted);text-align:center;margin:10px 0 4px}
.list{display:flex;flex-direction:column;gap:8px;margin-top:6px}
.row{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--line);
  border-radius:12px;padding:13px 14px;cursor:pointer}
.row:active{background:var(--surface-2)}
.dot{width:9px;height:9px;border-radius:50%;flex:0 0 auto}
.dot.new{background:var(--new)} .dot.review{background:var(--review)} .dot.known{background:var(--known)}
.row-main{flex:1;min-width:0}
.row-term{font-size:18px;line-height:1.9}
.row-mean{font-size:13px;color:var(--muted);margin-top:1px}
.badge{flex:0 0 auto;font-size:11px;padding:3px 9px;border-radius:20px;white-space:nowrap}
.badge.개념{background:var(--new-bg);color:var(--new)}
.badge.계정과목{background:var(--known-bg);color:var(--known)}
.badge.동사구문{background:var(--review-bg);color:var(--review)}
.empty{text-align:center;color:var(--muted);padding:48px 20px;font-size:14px}
/* speaker */
.say{border:none;background:transparent;cursor:pointer;color:var(--muted);padding:3px;vertical-align:middle;display:inline-flex;align-items:center;border-radius:8px}
.say svg{width:19px;height:19px}
.say:active{color:var(--indigo);background:var(--surface-2)}
.say.big{border:1px solid var(--line-strong);padding:10px 16px}
.say.big svg{width:24px;height:24px}
.say.playing{color:var(--indigo)}
body.no-tts .say{display:none}
/* viewer */
.viewer{position:fixed;inset:0;z-index:50;background:var(--bg);display:none;flex-direction:column}
.viewer.open{display:flex}
.vtop{display:flex;align-items:center;justify-content:space-between;padding:calc(12px + env(safe-area-inset-top)) 16px 10px}
.vprog{font-size:13px;color:var(--muted)}
.vclose{border:none;background:transparent;color:var(--ink);font-size:26px;cursor:pointer;width:36px;height:36px;line-height:1}
.vcard-area{flex:1;overflow-y:auto;padding:8px 18px 18px;display:flex;flex-direction:column}
.vcard{flex:1;background:var(--surface);border:1px solid var(--line);border-radius:18px;
  padding:26px 22px;display:flex;flex-direction:column;cursor:pointer;min-height:0}
.face-front{margin:auto;text-align:center}
.front-term{font-size:38px;line-height:2.0}
.front-hint{font-size:12px;color:var(--faint);margin-top:22px}
.vbadge{display:inline-block;font-size:12px;padding:4px 12px;border-radius:20px;margin-bottom:20px}
.back-head{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
.back-term{font-size:29px;line-height:1.8}
.back-read{font-size:14px;color:var(--muted)}
.back-mean{font-size:15px;color:var(--faint);margin:2px 0 16px}
.tbnote{background:var(--surface-2);border-radius:10px;padding:11px 13px;margin-bottom:16px;
  font-size:14px;line-height:2.0;color:var(--muted)}
.tbnote .tag{font-size:11px;color:var(--gold);display:block;margin-bottom:3px;letter-spacing:.5px}
.tbnote-memo{font-size:13px;color:var(--faint);line-height:1.95;margin-top:7px;padding-top:7px;border-top:1px dashed var(--line)}
.tbnote-memo b{color:var(--muted);font-weight:400}
.exs{border-top:1px solid var(--line);padding-top:6px}
.ex{margin-top:15px}
.ex-jp{font-size:17px;line-height:2.1}
.ex-jp .num{color:var(--faint);font-size:13px;margin-right:6px}
.ex-memo{font-size:13px;color:var(--faint);line-height:1.95;margin-top:3px;padding-left:18px}
.ex-memo b{color:var(--muted);font-weight:400}
.vactions{padding:12px 16px calc(16px + env(safe-area-inset-bottom));border-top:1px solid var(--line);background:var(--bg)}
.status-pick{display:flex;gap:8px;margin-bottom:10px}
.spick{flex:1;border:1px solid var(--line-strong);background:var(--surface);color:var(--muted);
  padding:12px 4px;border-radius:12px;font-size:13px;cursor:pointer;text-align:center}
.spick.on.new{background:var(--new-bg);border-color:var(--new);color:var(--new)}
.spick.on.review{background:var(--review-bg);border-color:var(--review);color:var(--review)}
.spick.on.known{background:var(--known-bg);border-color:var(--known);color:var(--known)}
.nav{display:flex;gap:10px}
.nav button{flex:1;border:1px solid var(--line-strong);background:var(--surface);color:var(--ink);
  padding:13px;border-radius:12px;font-size:14px;cursor:pointer}
.nav button:active{transform:scale(.98)}
.nav button:disabled{opacity:.35}
/* modal */
.modal{position:fixed;inset:0;z-index:60;background:rgba(0,0,0,.45);display:none;align-items:flex-end;justify-content:center}
.modal.open{display:flex}
.sheet{background:var(--surface);width:100%;max-width:640px;border-radius:18px 18px 0 0;
  padding:20px 18px calc(20px + env(safe-area-inset-bottom));max-height:86vh;overflow-y:auto}
.sheet h3{margin:0 0 4px;font-size:17px;font-weight:600}
.sheet p{margin:0 0 12px;font-size:13px;color:var(--muted)}
textarea{width:100%;min-height:150px;border:1px solid var(--line-strong);border-radius:12px;
  padding:12px;font-family:ui-monospace,Menlo,monospace;font-size:12px;background:var(--bg);color:var(--ink);resize:vertical}
.sheet-btns{display:flex;gap:8px;margin-top:12px}
.sheet-btns button{flex:1;padding:13px;border-radius:12px;font-size:14px;cursor:pointer;border:1px solid var(--line-strong);background:var(--surface);color:var(--ink)}
.sheet-btns .primary{background:var(--indigo);border-color:var(--indigo);color:#fff}
@media (prefers-color-scheme:dark){.sheet-btns .primary{color:#12151a}}
.form label{display:block;font-size:12px;color:var(--muted);margin:12px 0 4px}
.form input,.form select,.form textarea{width:100%;border:1px solid var(--line-strong);border-radius:10px;padding:11px;font-size:15px;background:var(--bg);color:var(--ink)}
.form textarea{font-family:ui-monospace,Menlo,monospace;font-size:12px;min-height:120px;resize:vertical;line-height:1.6}
.btn-danger{background:var(--review-bg)!important;border-color:var(--review)!important;color:var(--review)!important}
.linkbtn{border:none;background:transparent;color:var(--indigo);font-size:14px;cursor:pointer;text-decoration:underline;padding:6px}
.menu-item{padding:14px 4px;border-bottom:1px solid var(--line);font-size:15px;cursor:pointer;display:flex;justify-content:space-between}
.menu-item:last-child{border-bottom:none}
.msg{font-size:13px;margin-top:10px;padding:10px 12px;border-radius:10px;display:none}
.msg.ok{display:block;background:var(--known-bg);color:var(--known)}
.msg.err{display:block;background:var(--review-bg);color:var(--review)}
.vcheck{font-size:14px;line-height:1.95}
.vcheck .k{color:var(--muted)} .vcheck .v{font-weight:500}
.vcheck .good{color:var(--known)} .vcheck .bad{color:var(--review)}
@media (prefers-reduced-motion:no-preference){
  .row,.chip,.studybtn,.ibtn,.spick,.nav button{transition:transform .08s,background .12s,color .12s}
  .face-front,.face-back{animation:fade .18s ease}
  @keyframes fade{from{opacity:0}to{opacity:1}}
}
</style>
</head>

<header>

const SPK='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6 9H2v6h4l5 4V5z"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/><path d="M18.8 5.5a9 9 0 0 1 0 13"/></svg>';
let jaVoice=null;
function pickVoice(){try{const vs=speechSynthesis.getVoices();jaVoice=vs.find(v=>/^ja/i.test(v.lang))||null;}catch(e){}}
if("speechSynthesis" in window){pickVoice();try{speechSynthesis.onvoiceschanged=pickVoice;}catch(e){}}
function ttsOn(){return "speechSynthesis" in window;}
function speak(text,btn){
  if(!ttsOn()||!text)return;
  try{
    speechSynthesis.cancel();
    document.querySelectorAll(".say.playing").forEach(b=>b.classList.remove("playing"));
    const u=new SpeechSynthesisUtterance(text);
    u.lang="ja-JP"; u.rate=0.85; if(jaVoice)u.voice=jaVoice;
    if(btn){ btn.classList.add("playing"); u.onend=u.onerror=()=>btn.classList.remove("playing"); }
    speechSynthesis.speak(u);
  }catch(e){}
}
function stripFuri(s){return String(s).replace(/\[[^\]]*\]/g,"");}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/"/g,"&quot;");}
function sayBtn(text,big){return '<button class="say'+(big?" big":"")+'" data-say="'+esc(text)+'" aria-label="발음 듣기">'+SPK+'</button>';}

function rubyHTML(s){
  return String(s).replace(/([一-龥々ヶ]+)\[([^\]]+)\]/g,'<ruby>$1<rt>$2</rt></ruby>');
}
function normType(t){ return (t||"").replace(/·/g,"").replace(/\s/g,""); }

function seedCards(){
  return SEED.cards.map(c=>Object.assign({},c,{chapter:SEED.chapter}));
}
function load(){
  try{ const raw=localStorage.getItem(LS); if(raw){const a=JSON.parse(raw); if(Array.isArray(a)&&a.length) return a;} }catch(e){}
  const s=seedCards(); save(s); return s;
}
function save(a){ try{ localStorage.setItem(LS, JSON.stringify(a)); }catch(e){} }

let cards = load();
let f = {chapter:"all", type:"all", element:"all", status:"all"};
let view = [];   // filtered
let vi = 0;      // viewer index
let back = false;

function filtered(){
  return cards.filter(c=>
    (f.chapter==="all"||c.chapter===f.chapter) &&
    (f.type==="all"||c.type===f.type) &&
    (f.element==="all"||c.element===f.element) &&
    (f.status==="all"||(c.status||"new")===f.status));
}
const ELEM_ORDER=["자산","부채","순자산","수익","비용"];
function uniq(arr){ return [...new Set(arr)]; }

function renderStats(){
  const s={new:0,review:0,known:0};
  cards.forEach(c=>{s[c.status||"new"]++;});
  stNew.textContent=s.new; stReview.textContent=s.review; stKnown.textContent=s.known;
}
function chip(label,val,cur,count){
  const on = cur===val ? " on":"";
  const c = count!=null ? '<span class="c">'+count+'</span>':'';
  return '<button class="chip'+on+'" data-v="'+val+'">'+label+c+'</button>';
}
function renderFilters(){
  const chaps = uniq(cards.map(c=>c.chapter));
  chapChips.innerHTML = chip("전체","all",f.chapter,cards.length) +
    chaps.map(ch=>chip(ch,ch,f.chapter,cards.filter(c=>c.chapter===ch).length)).join("");
  const base = cards.filter(c=>f.chapter==="all"||c.chapter===f.chapter);
  const types = uniq(base.map(c=>c.type));
  typeChips.innerHTML = chip("전체","all",f.type,base.length) +
    types.map(t=>chip(t,t,f.type,base.filter(c=>c.type===t).length)).join("");
  const b1 = base.filter(c=>f.type==="all"||c.type===f.type);
  if(f.type==="계정과목"){
    const elems = ELEM_ORDER.filter(e=>b1.some(c=>c.element===e));
    elemLabel.style.display=""; elemChips.style.display="";
    elemChips.innerHTML = chip("전체","all",f.element,b1.length) +
      elems.map(e=>chip(e,e,f.element,b1.filter(c=>c.element===e).length)).join("");
  } else {
    if(f.element!=="all") f.element="all";
    elemLabel.style.display="none"; elemChips.style.display="none";
  }
  const b2 = b1.filter(c=>f.element==="all"||c.element===f.element);
  statusChips.innerHTML = chip("전체","all",f.status,b2.length) +
    ["new","review","known"].map(s=>chip(STAT[s],s,f.status,b2.filter(c=>(c.status||"new")===s).length)).join("");
}
function renderList(){
  view = filtered();
  countLine.textContent = view.length ? (view.length+"개 단어") : "";
  btnStudy.disabled = view.length===0;
  if(!view.length){ list.innerHTML='<div class="empty">이 조건에 맞는 단어가 없어요.<br>필터를 바꾸거나 새 단어를 불러오세요.</div>'; return; }
  list.innerHTML = view.map((c,i)=>{
    const st=c.status||"new";
    return '<div class="row" data-i="'+i+'">'+
      '<span class="dot '+st+'"></span>'+
      '<div class="row-main"><div class="row-term">'+rubyHTML(c.term)+'</div>'+
      '<div class="row-mean">'+c.meaning+'</div></div>'+
      '<span class="badge '+normType(c.type)+'">'+c.type+(c.element?' · '+c.element:'')+'</span></div>';
  }).join("");
}
function renderAll(){ renderStats(); renderFilters(); renderList(); }

/* viewer */
function openViewer(i){ vi=i; back=false; viewer.classList.add("open"); renderCard(); }
function closeViewer(){ if(ttsOn())try{speechSynthesis.cancel();}catch(e){} viewer.classList.remove("open"); renderAll(); }
function renderCard(){
  const c=view[vi]; if(!c){closeViewer();return;}
  vprog.textContent=(vi+1)+" / "+view.length;
  const tcls=normType(c.type);
  let badgeStyle = {개념:'new',계정과목:'known',동사구문:'review'}[tcls]||'new';
  const badge='<span class="vbadge badge '+tcls+'">'+c.type+(c.element?' · '+c.element:'')+'</span>';
  if(!back){
    vcard.innerHTML='<div class="face-front"><div>'+badge+'</div>'+
      '<div class="front-term">'+rubyHTML(c.term)+'</div>'+
      (ttsOn()?'<div style="margin-top:16px">'+sayBtn(c.reading,true)+'</div>':'')+
      '<div class="front-hint">탭해서 뜻 보기</div></div>';
  }else{
    let h='<div class="face-back"><div>'+badge+'</div>'+
      '<div class="back-head"><span class="back-term">'+rubyHTML(c.term)+'</span>'+
      (ttsOn()?sayBtn(c.reading,false):'')+
      '<span class="back-read">'+c.reading+'</span></div>'+
      '<div class="back-mean">'+c.meaning+'</div>';
    if(c.textbookNote){
      h+='<div class="tbnote"><span class="tag">설명</span>'+rubyHTML(c.textbookNote);
      if(c.defWords&&c.defWords.length){
        h+='<div class="tbnote-memo">'+c.defWords.map(w=>rubyHTML(w.w)+' <b>'+w.m+'</b>').join(' · ')+'</div>';
      }
      h+='</div>';
    }
    if(c.examples&&c.examples.length){
      h+='<div class="exs">';
      c.examples.forEach((e,n)=>{
        h+='<div class="ex"><div class="ex-jp"><span class="num">'+(n+1)+'.</span>'+rubyHTML(e.jp)+(ttsOn()?' '+sayBtn(stripFuri(e.jp),false):'')+'</div>';
        if(e.words&&e.words.length){
          h+='<div class="ex-memo">'+e.words.map(w=>rubyHTML(w.w)+' <b>'+w.m+'</b>').join(' · ')+'</div>';
        }
        h+='</div>';
      });
      h+='</div>';
    }
    h+='</div>';
    vcard.innerHTML=h;
  }
  document.querySelectorAll(".spick").forEach(b=>b.classList.toggle("on",b.dataset.s===(c.status||"new")));
  vprev.disabled = vi===0; vnext.disabled = vi===view.length-1;
}
function setStatus(s){
  const c=view[vi]; if(!c)return;
  c.status=s;
  const real=cards.find(x=>x.id===c.id&&x.chapter===c.chapter); if(real) real.status=s;
  save(cards); renderCard();
}

/* import */
function doImport(){
  const t=importText.value.trim(); const m=importMsg;
  m.className="msg"; 
  if(!t){ m.className="msg err"; m.textContent="붙여넣은 내용이 없어요."; return; }
  let data; try{ data=JSON.parse(t); }catch(e){ m.className="msg err"; m.textContent="JSON 형식이 올바르지 않아요."; return; }
  const chapter=data.chapter||"기타"; const incoming=data.cards||(Array.isArray(data)?data:null);
  if(!incoming||!incoming.length){ m.className="msg err"; m.textContent="cards 목록을 찾지 못했어요."; return; }
  let added=0,updated=0;
  incoming.forEach(nc=>{
    const cardChap = nc.chapter || chapter;
    const card=Object.assign({},nc,{chapter:cardChap}); if(!card.status)card.status="new";
    const ex=cards.find(x=>x.id===card.id&&x.chapter===cardChap);
    if(ex){ Object.assign(ex,card,{status:ex.status}); updated++; }
    else{ cards.push(card); added++; }
  });
  save(cards);
  m.className="msg ok"; m.textContent="완료 · 새 단어 "+added+"개, 갱신 "+updated+"개";
  importText.value="";
  renderAll();
}

/* card editor (add / edit / delete) */
let editingId=null;
function chapterOptions(sel){
  const chaps=uniq(cards.map(c=>c.chapter));
  edChapter.innerHTML=(chaps.length?chaps:["序章"]).map(c=>'<option'+(c===sel?' selected':'')+'>'+c+'</option>').join("");
}
function advObj(c){return JSON.stringify({textbookNote:c.textbookNote||"",defWords:c.defWords||[],examples:c.examples||[]},null,2);}
function toggleElem(){ edElemWrap.style.display = edType.value==="계정과목" ? "" : "none"; }
edType.onchange=toggleElem;
function openEdit(card){
  editingId=card.id; editTitle.textContent="단어 편집"; editDelete.style.display="";
  chapterOptions(card.chapter); edChapter.value=card.chapter;
  edTerm.value=card.term||""; edReading.value=card.reading||""; edMeaning.value=card.meaning||"";
  edType.value=card.type||"개념"; edElement.value=card.element||""; toggleElem();
  edAdvanced.value=advObj(card); editMsg.className="msg";
  editModal.classList.add("open");
}
function openAdd(){
  editingId=null; editTitle.textContent="새 단어 추가"; editDelete.style.display="none";
  const cur=(f.chapter!=="all")?f.chapter:null; chapterOptions(cur); if(cur)edChapter.value=cur;
  edTerm.value="";edReading.value="";edMeaning.value="";edType.value="개념";edElement.value="";toggleElem();
  edAdvanced.value='{\n  "textbookNote": "",\n  "defWords": [],\n  "examples": []\n}'; editMsg.className="msg";
  importModal.classList.remove("open"); editModal.classList.add("open");
}
function saveEdit(){
  const term=edTerm.value.trim(), meaning=edMeaning.value.trim();
  if(!term){ editMsg.className="msg err"; editMsg.textContent="표제어를 입력하세요."; return; }
  let adv={textbookNote:"",defWords:[],examples:[]};
  const raw=edAdvanced.value.trim();
  if(raw){ try{ adv=JSON.parse(raw); }catch(e){ editMsg.className="msg err"; editMsg.textContent="설명·예문 JSON 오류: "+e.message; return; } }
  const type=edType.value, chapter=edChapter.value;
  const base={term, reading:edReading.value.trim(), meaning, type,
    textbookNote:adv.textbookNote||"", defWords:adv.defWords||[], examples:adv.examples||[]};
  if(type==="계정과목" && edElement.value) base.element=edElement.value;
  const wasAdd=!editingId;
  if(editingId){
    const c=cards.find(x=>x.id===editingId);
    if(c){ Object.assign(c, base); c.chapter=chapter; if(type!=="계정과목") delete c.element; }
  }else{
    cards.push(Object.assign({id:"user-"+Date.now(), chapter, status:"new"}, base));
  }
  save(cards); editModal.classList.remove("open");
  if(viewer.classList.contains("open")){
    view=filtered(); renderStats(); renderFilters();
    if(!view.length){ closeViewer(); return; }
    if(!wasAdd){ const ni=view.findIndex(x=>x.id===editingId); vi=ni>=0?ni:Math.min(vi,view.length-1); }
    else { vi=Math.min(vi,view.length-1); }
    back=true; renderCard();
  } else renderAll();
}
function deleteCard(){
  if(!editingId) return;
  if(!confirm("이 단어를 삭제할까요? 되돌릴 수 없어요.")) return;
  const i=cards.findIndex(x=>x.id===editingId); if(i>=0) cards.splice(i,1);
  save(cards); editModal.classList.remove("open");
  if(viewer.classList.contains("open")){
    view=filtered(); renderStats(); renderFilters();
    if(!view.length) closeViewer(); else { vi=Math.min(vi,view.length-1); back=false; renderCard(); }
  } else renderAll();
}
vedit.onclick=()=>{ const c=view[vi]; if(c) openEdit(c); };
editCancel.onclick=()=>editModal.classList.remove("open");
editSave.onclick=saveEdit;
editDelete.onclick=deleteCard;
openAddCard.onclick=openAdd;
editModal.onclick=e=>{ if(e.target===editModal) editModal.classList.remove("open"); };

/* events */
chapChips.onclick=e=>{const b=e.target.closest(".chip");if(!b)return;f.chapter=b.dataset.v;f.type="all";f.element="all";f.status="all";renderFilters();renderList();};
typeChips.onclick=e=>{const b=e.target.closest(".chip");if(!b)return;f.type=b.dataset.v;f.element="all";f.status="all";renderFilters();renderList();};
elemChips.onclick=e=>{const b=e.target.closest(".chip");if(!b)return;f.element=b.dataset.v;f.status="all";renderFilters();renderList();};
statusChips.onclick=e=>{const b=e.target.closest(".chip");if(!b)return;f.status=b.dataset.v;renderFilters();renderList();};
list.onclick=e=>{const r=e.target.closest(".row");if(!r)return;openViewer(+r.dataset.i);};
btnStudy.onclick=()=>{ if(view.length) openViewer(0); };
vcard.onclick=e=>{const s=e.target.closest(".say");if(s){e.stopPropagation();speak(s.dataset.say,s);return;}back=!back;renderCard();};
vclose.onclick=closeViewer;
vprev.onclick=()=>{if(vi>0){vi--;back=false;renderCard();}};
vnext.onclick=()=>{if(vi<view.length-1){vi++;back=false;renderCard();}};
statusPick.onclick=e=>{const b=e.target.closest(".spick");if(!b)return;setStatus(b.dataset.s);};

btnImport.onclick=()=>{importModal.classList.add("open");importMsg.className="msg";};
importCancel.onclick=()=>importModal.classList.remove("open");
importDo.onclick=doImport;
importModal.onclick=e=>{if(e.target===importModal)importModal.classList.remove("open");};

btnMenu.onclick=()=>{menuModal.classList.add("open");menuMsg.className="msg";};
mClose.onclick=()=>menuModal.classList.remove("open");
menuModal.onclick=e=>{if(e.target===menuModal)menuModal.classList.remove("open");};
mExport.onclick=()=>{
  const blob=new Blob([JSON.stringify({exported:new Date().toISOString(),cards},null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob); const a=document.createElement("a");
  a.href=url;a.download="boki_backup.json";a.click();URL.revokeObjectURL(url);
  menuMsg.className="msg ok";menuMsg.textContent="백업 파일을 내려받았어요.";
};
mReset.onclick=()=>{
  if(confirm("모든 학습 상태와 불러온 단어가 삭제되고 序章 기본 세트로 돌아갑니다. 계속할까요?")){
    localStorage.removeItem(LS); cards=load(); f={chapter:"all",type:"all",element:"all",status:"all"};
    renderAll(); menuMsg.className="msg ok"; menuMsg.textContent="초기화했어요.";
  }
};
function voiceInfo(){
  if(!ttsOn()) return '<div class="bad">이 브라우저는 음성 합성을 지원하지 않아요.</div>';
  pickVoice();
  let vs=[]; try{vs=speechSynthesis.getVoices();}catch(e){}
  const ja=vs.filter(v=>/^ja/i.test(v.lang));
  let h='<div><span class="k">음성 합성 · </span><span class="v good">지원됨</span></div>';
  if(ja.length){ h+='<div><span class="k">일본어 음성 · </span><span class="v good">'+ja.map(v=>v.name).join(", ")+'</span></div>'; }
  else{ h+='<div><span class="k">일본어 음성 · </span><span class="v bad">아직 감지 안 됨</span></div>'+
        '<div style="font-size:12px;color:var(--faint);margin-top:2px">음성 목록이 늦게 로드될 수 있어요. 테스트 재생을 눌러보세요 — 실기기(사파리·크롬)에서는 대개 정상입니다.</div>'; }
  h+='<div><span class="k">감지된 전체 음성 · </span><span class="v">'+vs.length+'개</span></div>';
  return h;
}
function openVoiceCheck(){ menuModal.classList.remove("open"); voiceModal.classList.add("open"); vcheckInfo.innerHTML=voiceInfo(); voiceStatus.className="msg"; voiceStatus.textContent=""; }
mVoice.onclick=openVoiceCheck;
voiceClose.onclick=()=>{ if(ttsOn())try{speechSynthesis.cancel();}catch(e){} voiceModal.classList.remove("open"); };
voiceModal.onclick=e=>{ if(e.target===voiceModal){ if(ttsOn())try{speechSynthesis.cancel();}catch(e){} voiceModal.classList.remove("open"); } };
voiceTest.onclick=()=>{
  if(!ttsOn()){ voiceStatus.className="msg err"; voiceStatus.textContent="이 브라우저는 음성을 지원하지 않아요."; return; }
  let started=false;
  voiceStatus.className="msg ok"; voiceStatus.style.display="block"; voiceStatus.textContent="재생 준비 중…";
  try{
    speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance("簿記の勉強を始めましょう。");
    u.lang="ja-JP"; u.rate=0.9; pickVoice(); if(jaVoice)u.voice=jaVoice;
    u.onstart=()=>{ started=true; voiceStatus.className="msg ok"; voiceStatus.textContent="재생 중… 소리가 들리면 정상이에요."; vcheckInfo.innerHTML=voiceInfo(); };
    u.onend=()=>{ voiceStatus.className="msg ok"; voiceStatus.textContent="재생 완료 · 음성이 정상 동작해요"+(jaVoice?" ("+jaVoice.name+")":"")+"."; };
    u.onerror=ev=>{ voiceStatus.className="msg err"; voiceStatus.textContent="재생 오류: "+((ev&&ev.error)||"알 수 없음")+". 실기기에서 다시 시도해 보세요."; };
    speechSynthesis.speak(u);
    setTimeout(()=>{ if(!started){ voiceStatus.className="msg err"; voiceStatus.textContent="음성이 시작되지 않았어요. 이 미리보기 화면에서는 막힐 수 있어요 — 배포 후 사파리·크롬에서 열면 대개 정상입니다. 기기 음량과 무음 스위치도 확인하세요."; } }, 1800);
  }catch(e){ voiceStatus.className="msg err"; voiceStatus.textContent="오류: "+e.message; }
};

document.addEventListener("keydown",e=>{
  if(!viewer.classList.contains("open"))return;
  if(e.key==="ArrowLeft")vprev.click();
  else if(e.key==="ArrowRight")vnext.click();
  else if(e.key===" "){e.preventDefault();back=!back;renderCard();}
  else if(e.key==="Escape")closeViewer();
});

renderAll();
</script>
</body>
</html>
